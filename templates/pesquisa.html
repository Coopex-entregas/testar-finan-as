{% extends 'rh/base.html' %}{% block content %}<div class="card p-3 mb-3"><form class="row g-2"><div class="col-md-10"><input class="form-control" name="termo" placeholder="Pesquisar no estatuto, regimento e documentos RH" value="{{ termo }}"></div><div class="col-md-2 d-grid"><button class="btn btn-royal">Pesquisar</button></div></form></div><div class="card p-3">{% for r in resultados %}<div class="mb-3 pb-3 border-bottom"><div class="d-flex justify-content-between"><div><span class="pill">{{ r.tipo }}</span> <b>{{ r.titulo }}</b></div><div>{{ r.score }}</div></div><div class="mt-2">{{ r.snippet }}</div></div>{% else %}<div class="text-center py-4">{% if termo %}Nenhum resultado encontrado.{% else %}Digite um termo para pesquisar.{% endif %}</div>{% endfor %}</div>{% endblock %}
