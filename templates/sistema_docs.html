{% extends 'rh/base.html' %}{% block content %}<div class="card p-3 mb-3"><form method="post" enctype="multipart/form-data" class="row g-2"><div class="col-md-2"><select class="form-select" name="tipo"><option value="estatuto">Estatuto</option><option value="regimento">Regimento</option><option value="outros">Outros</option></select></div><div class="col-md-3"><input class="form-control" name="titulo" placeholder="Título"></div><div class="col-md-5"><input type="file" class="form-control" name="arquivo"></div><div class="col-md-2 d-grid"><button class="btn btn-royal">Enviar</button></div></form><form method="post" action="{{ url_for('admin_rh_docs_reindex') }}" class="mt-2"><button class="btn btn-outline-primary btn-sm">Reindexar documentos</button></form></div><div class="card p-0"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Tipo</th><th>Título</th><th>Arquivo</th><th></th></tr></thead><tbody>{% for d in docs %}<tr><td>{{ d.tipo }}</td><td>{{ d.titulo }}</td><td>{{ d.filename }}</td><td class="text-end"><a class="btn btn-sm btn-outline-primary" href="{{ url_for('admin_rh_documento_baixar', doc_id=d.id) }}">Baixar</a></td></tr>{% else %}<tr><td colspan="4" class="text-center py-4">Nenhum documento.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
