-md-2"><label class="form-label">Emissão RG</label><input type="date" class="form-control" name="rg_emissao" value="{{ perfil.rg_emissao.strftime('%Y-%m-%d') if perfil and perfil.rg_emissao else '' }}"></div><div class="col-md-2"><label class="form-label">PIS</label><input class="form-control" name="pis" value="{{ perfil.pis if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">CTPS Nº</label><input class="form-control" name="ctps_numero" value="{{ perfil.ctps_numero if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">CTPS Série</label><input class="form-control" name="ctps_serie" value="{{ perfil.ctps_serie if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">CTPS UF</label><input class="form-control" name="ctps_uf" value="{{ perfil.ctps_uf if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Título Nº</label><input class="form-control" name="titulo_numero" value="{{ perfil.titulo_numero if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Zona</label><input class="form-control" name="titulo_zona" value="{{ perfil.titulo_zona if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Seção</label><input class="form-control" name="titulo_secao" value="{{ perfil.titulo_secao if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">CNH Nº</label><input class="form-control" name="cnh_numero" value="{{ perfil.cnh_numero if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Categoria</label><input class="form-control" name="cnh_categoria" value="{{ perfil.cnh_categoria if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Validade CNH</label><input type="date" class="form-control" name="cnh_validade" value="{{ perfil.cnh_validade.strftime('%Y-%m-%d') if perfil and perfil.cnh_validade else '' }}"></div><div class="col-md-2"><label class="form-label">RENAVAM</label><input class="form-control" name="renavam" value="{{ perfil.renavam if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Validade RENAVAM</label><input type="date" class="form-control" name="renavam_validade" value="{{ perfil.renavam_validade.strftime('%Y-%m-%d') if perfil and perfil.renavam_validade else '' }}"></div><div class="col-md-3"><label class="form-label">Pai</label><input class="form-control" name="pai_nome" value="{{ perfil.pai_nome if perfil else '' }}"></div><div class="col-md-3"><label class="form-label">Mãe</label><input class="form-control" name="mae_nome" value="{{ perfil.mae_nome if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">CEP</label><input class="form-control" name="cep" value="{{ perfil.cep if perfil else '' }}"></div><div class="col-md-4"><label class="form-label">Rua</label><input class="form-control" name="rua" value="{{ perfil.rua if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Número</label><input class="form-control" name="numero" value="{{ perfil.numero if perfil else '' }}"></div><div class="col-md-3"><label class="form-label">Bairro</label><input class="form-control" name="bairro" value="{{ perfil.bairro if perfil else '' }}"></div><div class="col-md-3"><label class="form-label">Cidade</label><input class="form-control" name="cidade" value="{{ perfil.cidade if perfil else '' }}"></div><div class="col-md-1"><label class="form-label">UF</label><input class="form-control" name="uf" value="{{ perfil.uf if perfil else '' }}"></div><div class="col-md-3"><label class="form-label">PIX</label><input class="form-control" name="pix" value="{{ perfil.pix if perfil else '' }}"></div><div class="col-md-3"><label class="form-label">Banco</label><input class="form-control" name="banco" value="{{ perfil.banco if perfil else '' }}"></div><div class="col-md-2"><label class="form-label">Agência</label><input class="form-control" name="agencia" value="{{ perfil.agencia if perfil else '' }}">
